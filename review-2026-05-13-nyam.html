<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Microsoft JhengHei", sans-serif; background: #0d1117; color: #e6edf3; }
  #header { padding: 12px 20px; background: #161b22; border-bottom: 1px solid #30363d; display: flex; justify-content: space-between; align-items: center; }
  #header h1 { margin: 0; font-size: 18px; font-weight: 600; }
  #header .sub { font-size: 12px; color: #8b949e; margin-top: 2px; }

  .event .stage { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: #8b949e; padding: 2px 6px; background: #30363d; border-radius: 10px; margin-left: 6px; }
  .event .stage.rejected { background: #f85149; color: #fff; }
  .event .stage.candidate { background: #f0b32a; color: #000; }
  .event .stage.info { background: #6e7681; }
  .event .stage.summary { background: #1f6feb; }
  .event .stage.session_open, .event .stage.session_close { background: #8957e5; }
  .event .title { font-size: 14px; font-weight: 600; margin: 6px 0; color: #e6edf3; }
  .event .sop { font-size: 11px; color: #8b949e; font-style: italic; margin-bottom: 6px; }
  .event .narrative { font-size: 12px; line-height: 1.55; color: #c9d1d9; white-space: pre-wrap; }
  .event .decision { display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; margin-top: 8px; background: #30363d; }
  .event .decision.wait { background: #8b949e; color: #0d1117; }
  .event .question { background: #1c2128; border-left: 3px solid #f0b32a; padding: 8px 10px; margin-top: 8px; font-size: 11px; color: #f0b32a; }
  .comment-section { margin-top: 10px; }
  .comment-input { width: 100%; min-height: 60px; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 6px 8px; color: #e6edf3; font-family: inherit; font-size: 12px; resize: vertical; }
  .comment-input:focus { outline: none; border-color: #58a6ff; }
  .comment-saved { font-size: 10px; color: #3fb950; margin-top: 4px; }
  /* Tour overlay */
  #tour-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.78); z-index: 100; display: flex; justify-content: center; align-items: center; }
  #tour-box { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 24px 28px; max-width: 560px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
  #tour-box h2 { margin: 0 0 12px; color: #58a6ff; }
  #tour-box .step-counter { font-size: 11px; color: #8b949e; margin-bottom: 6px; letter-spacing: 1px; }
  #tour-box .content { font-size: 14px; line-height: 1.6; color: #c9d1d9; min-height: 100px; }
  #tour-box .nav { margin-top: 18px; display: flex; justify-content: space-between; align-items: center; }
  #tour-box code { background: #0d1117; padding: 2px 6px; border-radius: 3px; color: #f0b32a; font-size: 12px; }
  #tour-overlay.hidden { display: none; }
  /* Finish dialog */
  #finish-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 200; display: none; justify-content: center; align-items: center; }
  #finish-overlay.show { display: flex; }
  #finish-box { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 24px 28px; max-width: 640px; width: 90%; }

  #finish-box pre { background: #0d1117; padding: 12px; border-radius: 6px; overflow-x: auto; font-size: 12px; color: #f0b32a; }
</style>

       🔴 <strong>紅色虛線</strong> = 已被獵的 H/L<br><br>
       chart 上的 <strong>圓點/箭頭</strong> = Claude 標記的 SOP 事件位置。`
  },
  {
    title: "Step 2 · 看側邊欄(右半邊)",
    body: `右邊是 Claude 按 SOP 走的<strong>逐 event 推理 timeline</strong>。<br><br>
       每張卡片有:<br>
       • 時間(NY HH:MM)<br>
       • 階段標籤(rejected_setup / candidate / info ...)<br>
       • SOP 章節 cite<br>
       • Claude 的 reasoning(白話文)<br>
       • Decision(WAIT / CONSIDER / ENTER)<br><br>
       <strong>橘色 💬 框</strong>是 Claude 特別想問你的點。`
  },
  {
    title: "Step 3 · 互動 — 點側邊欄事件",
    body: `<strong>點任一張事件卡 → K 線圖會跳到那根 bar,卡片高亮成橘色邊框。</strong><br><br>
       這樣你可以對著盤面看 Claude 當時的判斷。<br><br>
       重點看的事件:<br>
       • 09:30 開盤 — pool init,deepest target 在哪<br>
       • 09:36 sweep — Claude 判定為什麼不算 valid setup<br>
       • 10:59 收盤總結 — 為什麼 0 trade`
  },
  {
    title: "Step 4 · 在事件下方留言",
    body: `每張卡片底部有 <strong>textarea</strong>,在 Claude 的 reasoning 下方留言。<br><br>
       例:<br>
       「09:36 sweep 我會進,vta_nqam_L 是 ATM Model L 直接當 sweep target,
        不要太死守 §2.4 deepest 規則」<br><br>
       留言會 <strong>自動存到瀏覽器(localStorage)</strong>,不會丟。<br><br>
       底部還有「整體 feedback」可以寫總結。`
  },
  {
    title: "Step 5 · 完成後做這件事",
    body: `留言完點右上 <strong>「✅ 完成評論」</strong>。<br><br>
       彈出視窗會告訴你:<br>
       1. 下載 <code>review-feedback.json</code>(或選 localStorage)<br>
       2. 開你自己的 Claude Code,跟他說:<br>
       &nbsp;&nbsp;&nbsp;<code>讀 ~/Downloads/review-feedback.json 改進 ATM SOP</code><br><br>
       你的 Claude Code 會讀檔,套你的 feedback 改 SOP / SKILL.<br><br>
       <strong>不需要傳回給我</strong> — 你跟自己的 Claude Code 互動完就好。`
  }
];
let tourStep = 0;
function showTour() {
  tourStep = 0;
  document.getElementById('tour-overlay').classList.remove('hidden');
  renderTour();
}
function skipTour() {
  document.getElementById('tour-overlay').classList.add('hidden');
  localStorage.setItem('atm-review-tour-seen', '1');
}
function tourPrev() {
  if (tourStep > 0) { tourStep--; renderTour(); }
}
function tourNext() {
  if (tourStep < TOUR.length - 1) { tourStep++; renderTour(); }
  else { skipTour(); }
}
function renderTour() {
  const t = TOUR[tourStep];
  document.getElementById('tour-step').textContent = tourStep + 1;
  document.getElementById('tour-title').textContent = t.title;
  document.getElementById('tour-content').innerHTML = t.body;
  document.getElementById('tour-prev').disabled = tourStep === 0;
  document.getElementById('tour-next').textContent = tourStep === TOUR.length - 1 ? '開始 review →' : '下一步 →';
}

// Auto-show tour on first visit
if (!localStorage.getItem('atm-review-tour-seen')) {
  setTimeout(showTour, 300);
}

// ==================== Finish ====================
function onFinish() {
  const comments = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
  const count = Object.keys(comments).filter(k => comments[k] && comments[k].trim()).length;
  document.getElementById('finish-count').textContent = count;
  const cmd = `
讀 ~/Downloads/review-feedback.json
根據 feedback 改進 ATM SOP /
~/Documents/trading/smc-trading-logic/ATM_Strategy/01_STRATEGY/SOP.md
跟 SKILL.md。每條 feedback 對應 SOP 章節,把該章節的判讀規則調整 / 加備註。
改完報告改了什麼 + 為什麼.
`.trim();
  document.getElementById('finish-cmd').textContent = cmd;
  document.getElementById('finish-overlay').classList.add('show');
}
function hideFinish() {
  document.getElementById('finish-overlay').classList.remove('show');
}
function downloadJSON() {
  const comments = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
  const payload = {
    review_id: "atm-review-2026-05-13-nyam",
    session: ANALYSIS.session,
    instructions_for_claude_code: "請讀 ~/Documents/trading/smc-trading-logic/ATM_Strategy/01_STRATEGY/SOP.md 跟 SKILL.md。根據下面 comments 改進判讀規則。每條 comment 對應一個 event_id;event 詳情看 events[].id 欄位。改完報告每個 SOP 章節修了什麼 + 為什麼。",
    events: ANALYSIS.events,
    comments: comments,
    submitted_at: new Date().toISOString(),
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'review-feedback-2026-05-13-nyam.json';
  a.click();
}
</script>
